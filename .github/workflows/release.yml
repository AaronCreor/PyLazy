name: Release

on:
  push:
    tags:
      - "v*"
      - "!v*rc*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag to release, for example v0.1.0"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-main:
    name: Verify main branch release
    if: ${{ github.event_name != 'workflow_dispatch' || !contains(inputs.tag, 'rc') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch release tag
        shell: bash
        run: |
          git fetch origin "refs/tags/${{ steps.resolve-tag.outputs.tag }}:refs/tags/${{ steps.resolve-tag.outputs.tag }}" --force

      - name: Check out tagged source for validation
        run: git checkout "${{ steps.resolve-tag.outputs.tag }}"

      - name: Verify tag points to a commit on main
        shell: bash
        run: |
          if [[ ! "${{ steps.resolve-tag.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable releases require tags like v1.2.3."
            exit 1
          fi

          git fetch origin main --depth=1
          target_sha="$(git rev-list -n 1 "${{ steps.resolve-tag.outputs.tag }}")"
          if [[ -z "${target_sha}" ]]; then
            echo "Tag ${{ steps.resolve-tag.outputs.tag }} does not exist."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${target_sha}" "origin/main"; then
            echo "Release tag must point to a commit reachable from origin/main."
            exit 1
          fi

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["project"]["version"])
          PY
          )"
          expected_tag="v${package_version}"
          actual_tag="${{ steps.resolve-tag.outputs.tag }}"

          if [[ "${expected_tag}" != "${actual_tag}" ]]; then
            echo "Tag/version mismatch: pyproject.toml declares ${package_version}, but workflow was run for ${actual_tag}."
            exit 1
          fi

  build:
    name: Build release packages
    runs-on: ubuntu-latest
    needs:
      - verify-main

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-main.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify-main
      - build
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-main.outputs.tag }}
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - verify-main
      - build
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/project/pyfuncai/

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
